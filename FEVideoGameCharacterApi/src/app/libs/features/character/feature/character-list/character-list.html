<div class="p-6">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Characters</h1>
      <p class="text-gray-500 text-sm mt-1">Manage all video game characters</p>
    </div>
    <p-button label="Add New" icon="pi pi-plus" (onClick)="openCreate()" />
  </div>

  <!-- Search -->
  <div class="mb-4">
    <span class="p-input-icon-left w-full max-w-sm">
      <i class="pi pi-search"></i>
      <input
        pInputText
        type="text"
        [(ngModel)]="searchKeyword"
        (ngModelChange)="onSearch()"
        placeholder="Search by name..."
        class="w-full"
      />
    </span>
  </div>

  <!-- Table -->
  <p-table
    [value]="filteredCharacters"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[5, 10, 20]"
    styleClass="p-datatable-gridlines"
    [tableStyle]="{ 'min-width': '50rem' }"
  >
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="name">Name <p-sortIcon field="name" /></th>
        <th pSortableColumn="role">Role <p-sortIcon field="role" /></th>
        <th pSortableColumn="power">Power <p-sortIcon field="power" /></th>
        <th pSortableColumn="blood">Blood <p-sortIcon field="blood" /></th>
        <th>Game</th>
        <th class="text-center">Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
      <tr>
        <td class="font-medium">{{ item.name }}</td>
        <td>
          <p-tag [value]="item.role" severity="info" />
        </td>
        <td>{{ item.power }}</td>
        <td>{{ item.blood }}</td>
        <td>
          @if (item.gameName) {
            <span class="text-blue-600 font-medium">{{ item.gameName }}</span>
          } @else {
            <span class="text-gray-400 italic">—</span>
          }
        </td>
        <td class="text-center">
          <div class="flex justify-center gap-2">
            <p-button
              icon="pi pi-pencil"
              severity="secondary"
              size="small"
              [rounded]="true"
              (onClick)="openEdit(item)"
            />
            <p-button
              icon="pi pi-trash"
              severity="danger"
              size="small"
              [rounded]="true"
              (onClick)="confirmDelete(item)"
            />
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="6" class="text-center py-8 text-gray-400">
          <i class="pi pi-inbox text-4xl block mb-2"></i>
          No characters found.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-confirmDialog />
