<div class="p-6">
  <!-- Header -->
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Games</h1>
      <p class="text-gray-500 text-sm mt-1">Manage all video games</p>
    </div>
    <p-button label="Add New" icon="pi pi-plus" (onClick)="openCreate()" />
  </div>

  <!-- Search -->
  <div class="mb-4">
    <span class="p-input-icon-left w-full max-w-sm">
      <i class="pi pi-search"></i>
      <input
        pInputText
        type="text"
        [(ngModel)]="searchKeyword"
        (ngModelChange)="onSearch()"
        placeholder="Search by name..."
        class="w-full"
      />
    </span>
  </div>

  <!-- Table -->
  <p-table
    [value]="filteredGames"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[5, 10, 20]"
    styleClass="p-datatable-gridlines"
    [tableStyle]="{ 'min-width': '60rem' }"
  >
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="name">Name <p-sortIcon field="name" /></th>
        <th pSortableColumn="genre">Genre <p-sortIcon field="genre" /></th>
        <th pSortableColumn="publisher">Publisher <p-sortIcon field="publisher" /></th>
        <th pSortableColumn="releaseDate">Release Date <p-sortIcon field="releaseDate" /></th>
        <th pSortableColumn="price">Price <p-sortIcon field="price" /></th>
        <th>Characters</th>
        <th class="text-center">Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
      <tr>
        <td class="font-medium">{{ item.name }}</td>
        <td>
          <p-tag [value]="item.genre" severity="success" />
        </td>
        <td>{{ item.publisher }}</td>
        <td>{{ item.releaseDate | date:'dd/MM/yyyy' }}</td>
        <td>{{ item.price | currency:'USD' }}</td>
        <td>
          <span class="inline-flex items-center gap-1">
            <i class="pi pi-users text-blue-500"></i>
            <span class="font-medium">{{ item.characters?.length ?? 0 }}</span>
          </span>
        </td>
        <td class="text-center">
          <div class="flex justify-center gap-2">
            <p-button
              icon="pi pi-users"
              severity="info"
              size="small"
              [rounded]="true"
              pTooltip="Manage Characters"
              tooltipPosition="top"
              (onClick)="openManageCharacters(item)"
            />
            <p-button
              icon="pi pi-pencil"
              severity="secondary"
              size="small"
              [rounded]="true"
              (onClick)="openEdit(item)"
            />
            <p-button
              icon="pi pi-trash"
              severity="danger"
              size="small"
              [rounded]="true"
              (onClick)="confirmDelete(item)"
            />
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7" class="text-center py-8 text-gray-400">
          <i class="pi pi-inbox text-4xl block mb-2"></i>
          No games found.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-confirmDialog />
